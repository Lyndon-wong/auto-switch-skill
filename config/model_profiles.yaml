# ============================================================
# 模糊匹配规则说明
#
# 系统通过以下步骤将用户注册的模型 ID 匹配到画像：
#
# 1. 标准化模型 ID
#    "Qwen/Qwen2.5-7B-Instruct" → 提取厂商 "qwen" + 模型标记 "2.5-7b"
#
# 2. 匹配画像键名
#    按优先级尝试从精确到模糊：
#    a) 完全匹配: "alibaba/qwen-2.5-7b"
#    b) 家族+规模匹配: "qwen" + "7b" → "alibaba/qwen-2.5-7b"
#    c) 家族+最近规模: "qwen" + "10b" → 最接近的 "alibaba/qwen-2.5-14b"
#    d) 仅家族匹配: "qwen" → 取该家族中等规模的画像
#    e) 全部未匹配 → 使用 "_default"
#
# 3. 厂商别名映射
#    以下别名等价：
#    - qwen / tongyi / 通义 → alibaba
#    - chatglm / glm / chatglm → zhipu
#    - ernie / wenxin / 文心 → baidu
#    - spark / 星火 → iflytek
#    - doubao / 豆包 → bytedance
#    - kimi → moonshot
#    - yi → 01ai
#    - grok → xai
#    - mimo → xiaomi
#    - command → cohere
#    - nova → amazon
#    - hunyuan / 混元 → tencent
#    - internlm / 书生 → internlm
#    - sensenova / 日日新 → sensetime
# ============================================================
