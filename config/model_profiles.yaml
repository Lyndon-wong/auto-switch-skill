# ============================================================
# Auto-Switch-Skill 内置模型能力画像库
# Model Capability Profile Library
#
# 📌 本文件定义了主流 LLM 在各任务类型上的默认适配权重。
# 📌 权重范围 0-100，数值越高表示该模型越适合该类任务。
# 📌 首次安装时，系统根据用户已注册的模型列表，
#    模糊匹配本库中的画像，自动生成用户的 routing_matrix.yaml。
# 📌 未匹配到画像的模型，所有任务权重默认为 3（不推荐，需用户手动配置）。
#
# 权重参考标准：
#   90-100  最佳适配（该模型是此任务的首选）
#   70-89   高度适配（很好完成，但不是最优）
#   50-69   基本适配（可以完成，质量/效率不是最佳）
#   30-49   勉强适配（能力边界，仅在无更优选项时使用）
#   0-29    不推荐（基本不适合此任务）
#
# 任务类型说明：
#   CHAT         日常对话、闲聊、问候、简单问答
#   QA           知识问答、事实查询、概念解释
#   SUMMARIZE    摘要生成、文档摘要、会议纪要
#   TRANSLATE    多语言互译
#   CODE_SIMPLE  函数编写、Bug修复、简单脚本
#   CODE_COMPLEX 架构设计、大规模重构、多文件协同
#   REASONING    逻辑推理、数学证明、因果分析
#   ANALYSIS     长文档分析、数据解读、报告生成
#   CREATIVE     文案创作、营销文本、方案设计
#   MULTI_STEP   工作流编排、复合任务、多步骤规划
#
# 数据来源：
#   LMSYS Chatbot Arena Elo 排名（2026.04）
#   SWE-bench Verified（软件工程基准）
#   AIME/GPQA Diamond（数学/科学推理基准）
#   LiveCodeBench（编程基准，抗数据污染）
#   WMT25 人工评估（翻译基准）
#   各厂商官方技术报告及社区评测
#
# 版本：v1.1 | 2026-04-06
# 变更：根据 benchmark_mapping.md 中的基准数据全面校准权重
# ============================================================


